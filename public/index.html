<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GLM Chat Companion</title>
    <link rel="stylesheet" href="/public/styles.css" />
  </head>
  <body>
    <main id="appShell" class="app-shell view-menu">
      <div id="loginOverlay" class="modal-overlay auth-overlay" hidden>
        <form id="loginForm" class="modal-panel modal-panel-narrow auth-panel">
          <header class="modal-header">
            <h2 data-i18n="loginTitle">Login</h2>
          </header>

          <div class="settings-stack">
            <label class="field">
              <span data-i18n="usernameLabel">Username</span>
              <input id="loginUsername" type="text" autocomplete="username" required />
            </label>

            <label class="field">
              <span data-i18n="passwordLabel">Password</span>
              <input id="loginPassword" type="password" autocomplete="current-password" required />
            </label>

            <p id="loginError" class="modal-body-text auth-error" hidden></p>
          </div>

          <footer class="modal-footer">
            <button id="loginButton" class="button button-primary" type="submit" data-i18n="loginButton">Login</button>
          </footer>
        </form>
      </div>

      <aside class="menu-panel" aria-label="Menu">
        <header class="menu-header">
          <div>
            <p id="menuEyebrow" class="eyebrow" data-i18n="charactersEyebrow">Characters</p>
            <h1 data-i18n="menuTitle">Menu</h1>
          </div>
          <button id="openMenuSettingsButton" class="button menu-settings-button icon-button" type="button" aria-label="Settings" data-i18n-aria-label="settingsButton">
            <img class="button-icon" src="/Icons/Settings.png" alt="" />
          </button>
        </header>

        <nav id="menuPageToggle" class="menu-page-toggle" aria-label="Menu pages">
          <button class="menu-page-option" type="button" data-menu-page-value="characters" aria-label="Characters" data-i18n-aria-label="charactersPageButton">
            <img class="button-icon" src="/Icons/Characters.png" alt="" />
            <span class="visually-hidden" data-i18n="charactersPageButton">Characters</span>
          </button>
          <button class="menu-page-option" type="button" data-menu-page-value="stories" aria-label="Stories" data-i18n-aria-label="storiesPageButton">
            <img class="button-icon" src="/Icons/Stories.png" alt="" />
            <span class="visually-hidden" data-i18n="storiesPageButton">Stories</span>
          </button>
          <button class="menu-page-option" type="button" data-menu-page-value="history" aria-label="History" data-i18n-aria-label="historyPageButton">
            <img class="button-icon" src="/Icons/History.png" alt="" />
            <span class="visually-hidden" data-i18n="historyPageButton">History</span>
          </button>
        </nav>

        <div id="characterGrid" class="character-grid"></div>
        <div id="storyGrid" class="character-grid story-grid" hidden></div>
        <div id="historyList" class="history-list" hidden></div>

      </aside>

      <div id="menuSettingsModal" class="modal-overlay" hidden>
        <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="menuSettingsTitle">
          <header class="modal-header">
            <h2 id="menuSettingsTitle" data-i18n="menuSettingsTitle">Settings</h2>
            <button id="closeMenuSettingsButton" class="button button-ghost" type="button" data-i18n="closeButton">Close</button>
          </header>

          <div class="settings-stack">
            <label class="field">
              <span data-i18n="modelLabel">Model</span>
              <select id="modelSelect"></select>
            </label>

            <label class="field">
              <span class="field-label-row">
                <span data-i18n="temperatureLabel">Temperature</span>
                <output id="temperatureValue" for="temperatureInput">0.9</output>
              </span>
              <input id="temperatureInput" type="range" min="0" max="2" step="0.1" value="0.9" />
            </label>

            <label class="field">
              <span class="field-label-row">
                <span data-i18n="replyLengthLabel">Reply Length</span>
                <output id="replyLengthValue" for="replyLengthInput">Short</output>
              </span>
              <input id="replyLengthInput" type="range" min="1" max="3" step="1" value="1" />
            </label>

            <label class="field">
              <span data-i18n="fontSizeLabel">Font Size</span>
              <input id="menuTextSizeInput" type="range" min="85" max="200" step="5" value="103" />
            </label>

            <label class="field">
              <span data-i18n="charactersPerRowLabel">Characters Per Row</span>
              <input id="characterColumnsInput" type="range" min="2" max="5" step="1" value="2" />
            </label>

            <label class="field">
              <span data-i18n="colorModeLabel">Color Mode</span>
              <div id="themeToggle" class="theme-toggle" role="group" aria-label="Color mode" data-i18n-aria-label="colorModeLabel">
                <button class="theme-option" type="button" data-theme-value="day" data-i18n="themeDay">Day</button>
                <button class="theme-option" type="button" data-theme-value="night" data-i18n="themeNight">Night</button>
              </div>
            </label>

            <label class="field">
              <span data-i18n="languageLabel">Language</span>
              <div id="languageToggle" class="theme-toggle" role="group" aria-label="Language" data-i18n-aria-label="languageLabel">
                <button class="theme-option" type="button" data-language-value="english" data-i18n="languageEnglish">English</button>
                <button class="theme-option" type="button" data-language-value="chinese" data-i18n="languageChinese">中文</button>
              </div>
            </label>
          </div>
        </section>
      </div>

      <div id="characterSettingsModal" class="modal-overlay" hidden>
        <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="characterSettingsTitle">
          <header class="modal-header">
            <h2 id="characterSettingsTitle" data-i18n="characterSettingsTitle">Character Settings</h2>
            <div class="modal-actions">
              <button id="revertCharacterSettingsButton" class="button button-ghost" type="button" data-i18n="revertButton">Revert</button>
              <button id="closeCharacterSettingsButton" class="button button-ghost" type="button" data-i18n="closeButton">Close</button>
            </div>
          </header>

          <div class="settings-stack">
            <label class="field">
              <span data-i18n="relationshipLabel">Relationship</span>
              <textarea
                id="relationshipPrompt"
                rows="5"
                placeholder="Describe your relationship with this character."
                data-i18n-placeholder="relationshipPlaceholder"
              ></textarea>
              <div id="relationshipPresetStrip" class="relationship-preset-strip"></div>
            </label>

            <label class="field">
              <span data-i18n="firstLineLabel">First Line</span>
              <textarea
                id="firstLinePrompt"
                rows="3"
                placeholder="Write the character's first line."
                data-i18n-placeholder="firstLinePlaceholder"
              ></textarea>
            </label>

            <label class="field">
              <span data-i18n="characterDescriptionLabel">Character Description</span>
              <textarea
                id="characterDescriptionPrompt"
                rows="6"
                placeholder="Describe this character's personality, voice, and details."
                data-i18n-placeholder="characterDescriptionPlaceholder"
              ></textarea>
            </label>

            <label class="field">
              <span data-i18n="backgroundLabel">Background</span>
              <div id="backgroundStrip" class="background-strip"></div>
            </label>

            <div class="setting-row">
              <label class="field">
                <span data-i18n="spriteSizeLabel">Sprite Size</span>
                <input id="spriteScaleInput" type="range" min="80" max="220" step="5" value="100" />
              </label>

              <label class="field">
                <span data-i18n="dialogueSizeLabel">Dialogue Size</span>
                <input id="dialogueHeightInput" type="range" min="28" max="52" step="2" value="38" />
              </label>
            </div>
          </div>

          <footer class="modal-footer">
            <button id="startCharacterConversationButton" class="button button-primary" type="button" data-i18n="startButton">Start</button>
          </footer>
        </section>
      </div>

      <div id="historySettingsModal" class="modal-overlay" hidden>
        <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="historySettingsTitle">
          <header class="modal-header">
            <h2 id="historySettingsTitle" data-i18n="historySettingsTitle">History Settings</h2>
            <button id="closeHistorySettingsButton" class="button button-ghost" type="button" data-i18n="closeButton">Close</button>
          </header>

          <div class="settings-stack">
            <label class="field">
              <span data-i18n="historyNameLabel">History Name</span>
              <input id="historyTitleInput" type="text" />
            </label>

            <label class="field">
              <span data-i18n="relationshipLabel">Relationship</span>
              <textarea
                id="historyRelationshipPrompt"
                rows="5"
                placeholder="Describe your relationship with this character."
                data-i18n-placeholder="relationshipPlaceholder"
              ></textarea>
            </label>

            <label class="field">
              <span data-i18n="firstLineLabel">First Line</span>
              <textarea
                id="historyFirstLinePrompt"
                rows="3"
                placeholder="Write the character's first line."
                data-i18n-placeholder="firstLinePlaceholder"
              ></textarea>
            </label>

            <label class="field">
              <span data-i18n="characterDescriptionLabel">Character Description</span>
              <textarea
                id="historyDescriptionPrompt"
                rows="6"
                placeholder="Describe this character's personality, voice, and details."
                data-i18n-placeholder="characterDescriptionPlaceholder"
              ></textarea>
            </label>
          </div>

          <footer class="modal-footer">
            <button id="downloadHistorySettingsButton" class="button button-primary" type="button" data-i18n="downloadHistoryButton">Download History</button>
          </footer>
        </section>
      </div>

      <div hidden>
        <textarea id="systemPrompt"></textarea>
        <textarea id="worldPrompt"></textarea>
        <input id="maxTokensInput" type="number" min="32" max="300" step="1" value="300" />
      </div>

      <section class="conversation-panel" aria-label="Conversation">
        <button id="showToolbarButton" class="toolbar-show-button button button-ghost" type="button" data-i18n="showButton">Show</button>
        <header id="conversationHeader" class="conversation-header">
          <button id="backToMenuButton" class="button button-ghost" type="button" data-i18n="menuTitle">Menu</button>
          <div class="conversation-title">
            <button id="hideToolbarButton" class="toolbar-hide-button" type="button" aria-label="Hide top menu" data-i18n="hideButton" data-i18n-aria-label="hideTopMenuLabel">Hide</button>
            <div>
              <p class="eyebrow" data-i18n="conversationEyebrow">Conversation</p>
              <h2 id="characterName">No character selected</h2>
            </div>
          </div>
          <div class="header-actions">
            <button id="openConversationSettingsButton" class="button button-ghost icon-button" type="button" aria-label="Settings" data-i18n-aria-label="settingsButton">
              <img class="button-icon" src="/Icons/Settings.png" alt="" />
            </button>
            <button id="clearChatButton" class="button button-ghost icon-button" type="button" aria-label="Clear" data-i18n-aria-label="clearButton">
              <img class="button-icon" src="/Icons/Clear.png" alt="" />
            </button>
          </div>
        </header>

        <div id="conversationSettingsModal" class="modal-overlay" hidden>
          <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="conversationSettingsTitle">
            <header class="modal-header">
              <h2 id="conversationSettingsTitle" data-i18n="menuSettingsTitle">Settings</h2>
              <button id="closeConversationSettingsButton" class="button button-ghost" type="button" data-i18n="closeButton">Close</button>
            </header>

            <div class="settings-stack">
              <label class="field">
                <span data-i18n="textSizeLabel">Text Size</span>
                <input id="textSizeInput" type="range" min="85" max="200" step="5" value="103" />
              </label>

              <label class="field">
                <span data-i18n="characterPositionLabel">Character Position</span>
                <input id="characterPositionInput" type="range" min="-120" max="120" step="2" value="0" />
              </label>

              <label class="field">
                <span data-i18n="characterSizeLabel">Character Size</span>
                <input id="characterSizeQuickInput" type="range" min="80" max="220" step="5" value="100" />
              </label>

              <label class="field">
                <span data-i18n="dialogueHeightLabel">Dialogue Height</span>
                <input id="dialogueHeightQuickInput" type="range" min="28" max="52" step="2" value="38" />
              </label>

              <label class="field">
                <span class="field-label-row">
                  <span data-i18n="replyLengthLabel">Reply Length</span>
                  <output id="replyLengthQuickValue" for="replyLengthQuickInput">Short</output>
                </span>
                <input id="replyLengthQuickInput" type="range" min="1" max="3" step="1" value="1" />
              </label>

              <label class="field">
                <span data-i18n="backgroundLabel">Background</span>
                <div id="backgroundQuickStrip" class="background-strip"></div>
              </label>

              <label class="field">
                <span data-i18n="historyLabel">History File</span>
                <div class="history-actions">
                  <button id="exportHistoryButton" class="button button-primary" type="button" data-i18n="exportHistoryButton">Export History</button>
                  <button id="importHistoryButton" class="button button-ghost" type="button" data-i18n="importHistoryButton">Import History</button>
                </div>
                <input id="historyFileInput" class="visually-hidden-file" type="file" accept="application/json,.json" />
              </label>
            </div>
          </section>
        </div>

        <div id="clearChatConfirmModal" class="modal-overlay" hidden>
          <section class="modal-panel modal-panel-narrow" role="dialog" aria-modal="true" aria-labelledby="clearChatConfirmTitle">
            <header class="modal-header">
              <h2 id="clearChatConfirmTitle" data-i18n="clearConfirmTitle">Clear conversation?</h2>
            </header>

            <p class="modal-body-text" data-i18n="clearConfirmMessage">This will delete the current chat history. This cannot be undone.</p>

            <footer class="modal-footer">
              <button id="cancelClearChatButton" class="button button-ghost" type="button" data-i18n="cancelButton">Cancel</button>
              <button id="confirmClearChatButton" class="button button-primary" type="button" data-i18n="clearConfirmButton">Clear Conversation</button>
            </footer>
          </section>
        </div>

        <div class="character-stage">
          <img id="characterPortrait" class="character-portrait" src="" alt="" />
        </div>

        <form id="chatForm" class="dialogue-form">
          <textarea
            id="dialogueBox"
            class="dialogue-box"
            spellcheck="true"
            enterkeyhint="send"
            aria-label="Dialogue"
            data-i18n-aria-label="dialogueAriaLabel"
          ></textarea>
        </form>
      </section>

      <section class="story-panel" aria-label="Story">
        <button id="showStoryToolbarButton" class="story-toolbar-show-button button button-ghost" type="button" data-i18n="showButton">Show</button>
        <header class="story-header">
          <button id="backFromStoryButton" class="button button-ghost" type="button" data-i18n="menuTitle">Menu</button>
          <div class="story-title">
            <button id="hideStoryToolbarButton" class="toolbar-hide-button" type="button" aria-label="Hide top menu" data-i18n="hideButton" data-i18n-aria-label="hideTopMenuLabel">Hide</button>
            <div>
              <p class="eyebrow" data-i18n="storiesPageButton">Stories</p>
              <h2 id="storyTitle">Mitsui Hisashi</h2>
            </div>
          </div>
          <div class="header-actions">
            <button id="openStorySettingsButton" class="button button-ghost icon-button" type="button" aria-label="Settings" data-i18n-aria-label="settingsButton">
              <img class="button-icon" src="/Icons/Settings.png" alt="" />
            </button>
            <button id="clearStoryButton" class="button button-ghost icon-button" type="button" aria-label="Clear" data-i18n-aria-label="clearButton">
              <img class="button-icon" src="/Icons/Clear.png" alt="" />
            </button>
          </div>
        </header>

        <div id="storySettingsModal" class="modal-overlay" hidden>
          <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="storySettingsTitle">
            <header class="modal-header">
              <h2 id="storySettingsTitle" data-i18n="menuSettingsTitle">Settings</h2>
              <button id="closeStorySettingsButton" class="button button-ghost" type="button" data-i18n="closeButton">Close</button>
            </header>

            <div class="settings-stack">
              <label id="storyCharacterSelectField" class="field" hidden>
                <span data-i18n="charactersPageButton">Characters</span>
                <select id="storyCharacterSelect"></select>
              </label>

              <label class="field">
                <span data-i18n="textSizeLabel">Text Size</span>
                <input id="storyTextSizeInput" type="range" min="85" max="200" step="5" value="103" />
              </label>

              <label class="field">
                <span data-i18n="characterPositionLabel">Character Position</span>
                <input id="storyCharacterPositionInput" type="range" min="-120" max="120" step="2" value="0" />
              </label>

              <label class="field">
                <span data-i18n="characterSizeLabel">Character Size</span>
                <input id="storyCharacterSizeInput" type="range" min="80" max="220" step="5" value="100" />
              </label>

              <label class="field">
                <span data-i18n="dialogueHeightLabel">Dialogue Height</span>
                <input id="storyDialogueHeightInput" type="range" min="28" max="52" step="2" value="38" />
              </label>

              <label class="field">
                <span class="field-label-row">
                  <span data-i18n="replyLengthLabel">Reply Length</span>
                  <output id="storyReplyLengthValue" for="storyReplyLengthInput">Short</output>
                </span>
                <input id="storyReplyLengthInput" type="range" min="1" max="3" step="1" value="1" />
              </label>

              <label id="storyBackgroundField" class="field">
                <span data-i18n="backgroundLabel">Background</span>
                <div id="storyBackgroundQuickStrip" class="background-strip"></div>
              </label>
            </div>
          </section>
        </div>

        <div class="story-actions">
          <button id="storyNextButton" class="button button-primary" type="button" data-i18n="storyNextButton">Next CG</button>
        </div>

        <div class="story-stage">
          <img id="storyCgImage" class="story-cg-image" src="" alt="" />
        </div>

        <section id="storyBubblePanel" class="story-bubble-panel" aria-label="Story chat" hidden>
          <div id="storyCharacterPicker" class="story-character-picker"></div>
          <div id="storyBubbleLog" class="story-bubble-log"></div>
          <form id="storyBubbleForm" class="story-bubble-form">
            <button id="storyCgToggleButton" class="button button-ghost" type="button">CG</button>
            <input id="storyBubbleInput" type="text" autocomplete="off" enterkeyhint="send" aria-label="Story message" />
            <button id="storyBubbleSendButton" class="button button-primary" type="submit" data-i18n="sendButton">Send</button>
          </form>
          <div id="storyCgPicker" class="story-cg-picker" aria-label="CG picker" hidden></div>
        </section>

        <form id="storyChatForm" class="dialogue-form story-dialogue-form">
          <textarea
            id="storyDialogueBox"
            class="dialogue-box"
            spellcheck="true"
            enterkeyhint="send"
            aria-label="Story dialogue"
            data-i18n-aria-label="storyDialogueAriaLabel"
          ></textarea>
        </form>
      </section>

      <section class="minigame-panel" aria-label="Basketball minigame">
        <header class="minigame-header">
          <button id="backFromMinigameButton" class="button button-ghost" type="button" data-i18n="storiesPageButton">Stories</button>
          <div>
            <p class="eyebrow" data-i18n="storiesPageButton">Stories</p>
            <h2>Mitsui Hisashi</h2>
          </div>
        </header>
        <iframe
          id="minigameFrame"
          class="minigame-frame"
          title="Mitsui Hisashi Basketball"
          src="/Minigame/Basketball/index.html"
        ></iframe>
      </section>
    </main>

    <script type="module" src="/public/app.js"></script>
  </body>
</html>
